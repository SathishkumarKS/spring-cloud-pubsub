openapi: 3.0.3
info:
  title: Order Service API
  description: REST API for managing orders and publishing order events to Google Cloud Pub/Sub
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development server

security: []

paths:
  /api/orders:
    post:
      summary: Create a new order
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Validation error or malformed request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
    get:
      summary: Get all orders
      operationId: getAllOrders
      responses:
        '200':
          description: List of all orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
  /api/orders/{id}:
    parameters:
      - schema:
          type: string
          format: uuid
        name: id
        in: path
        required: true
    get:
      summary: Get an order by ID
      operationId: getOrderById
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Invalid ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update an existing order
      operationId: updateOrder
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderRequest'
      responses:
        '200':
          description: Order updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Validation error or malformed request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete an order
      operationId: deleteOrder
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '204':
          description: Order deleted successfully
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  parameters:
    OrderId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    CreateOrderRequest:
      type: object
      required:
        - customerName
        - product
        - quantity
        - price
      properties:
        customerName:
          type: string
          minLength: 1
          maxLength: 255
          description: Name of the customer
        product:
          type: string
          minLength: 1
          maxLength: 255
          description: Product name
        quantity:
          type: integer
          minimum: 1
          maximum: 10000
          description: Quantity ordered
        price:
          type: number
          minimum: 0.01
          maximum: 999999.99
          description: Price of the order

    UpdateOrderRequest:
      type: object
      required:
        - customerName
        - product
        - quantity
        - price
        - status
      properties:
        customerName:
          type: string
          minLength: 1
          maxLength: 255
          description: Name of the customer
        product:
          type: string
          minLength: 1
          maxLength: 255
          description: Product name
        quantity:
          type: integer
          minimum: 1
          maximum: 10000
          description: Quantity ordered
        price:
          type: number
          minimum: 0.01
          maximum: 999999.99
          description: Price of the order
        status:
          $ref: '#/components/schemas/OrderStatus'

    OrderResponse:
      type: object
      required:
        - id
        - customerName
        - product
        - quantity
        - price
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        customerName:
          type: string
        product:
          type: string
        quantity:
          type: integer
        price:
          type: number
        status:
          $ref: '#/components/schemas/OrderStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderStatus:
      type: string
      enum:
        - CREATED
        - CONFIRMED
        - SHIPPED
        - DELIVERED
        - CANCELLED

    ErrorResponse:
      type: object
      required:
        - error
        - message
        - timestamp
      properties:
        error:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    ValidationErrorResponse:
      type: object
      required:
        - error
        - message
        - timestamp
      properties:
        error:
          type: string
        message:
          type: string
        errors:
          type: array
          items:
            type: string
        timestamp:
          type: string
          format: date-time
